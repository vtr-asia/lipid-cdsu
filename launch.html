<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣血脂 CDS - 啟動中...</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- 鎖定 fhirclient 穩定版本 -->
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
  
  <style>
    :root {
      --primary: #0066cc;
      --bg-dark: #0a192f;
      --text-light: #e6f1ff;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .loader-container { 
      padding: 20px; 
      max-width: 420px; 
    }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }
    .error-message {
      color: #ff6b6b;
      margin-top: 20px;
      font-size: 14px;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: left;
      display: none;
    }
    .error-message a { 
      color: #4da6ff; 
    }
  </style>
</head>
<body>

  <div class="loader-container">
    <div class="loader" id="loader"></div>
    <h2>正在連線至 FHIR 醫療資訊系統...</h2>
    <p>請稍候，我們正在準備您的臨床決策輔助工具</p>
    <div id="errorMsg" class="error-message"></div>
  </div>

  <script>
    /**
     * 台灣血脂 CDS - launch.html (Confidential Client 版本)
     * 專為 bdlfhir.net 設計，使用 client_secret_basic
     */

    // 動態產生 redirectUri（自動適應任何部署環境）
    const redirectUri = window.location.href.replace('launch.html', 'index.html');

    FHIR.oauth2.authorize({
      clientId: "cc344727-6f90-496c-94fd-c7829aa9a51d",

      // === 重要：Confidential Client 必須提供 ===
      clientSecret: "79f04b56b33491716c0880af72cdef7d3f0629111421cedd18353651cd313d9e",

      // 權限範圍（已包含 launch/patient）
      scope: "launch launch/patient openid fhirUser patient/Patient.read patient/Observation.read patient/MedicationRequest.read patient/Condition.read",

      redirectUri: redirectUri,

      // 強制使用 PKCE S256（安全性較高）
      pkceMode: "S256",

      // === 關鍵修正：要求使用 Basic Authentication ===
      tokenEndpointAuthMethod: "client_secret_basic"

    }).catch(err => {
      console.error("FHIR 授權失敗:", err);

      // 顯示錯誤訊息，方便診斷
      document.getElementById("loader").style.display = "none";
      const errorDiv = document.getElementById("errorMsg");
      errorDiv.style.display = "block";
      errorDiv.innerHTML = `
        <strong>⚠️ 授權啟動失敗</strong><br><br>
        錯誤訊息：${err.message || err}<br><br>
        請關閉此視窗，從 
        <a href="https://launch.smarthealthit.org/" target="_blank">SMART Launcher</a> 
        重新啟動 App。
      `;
    });
  </script>
</body>
</html>
