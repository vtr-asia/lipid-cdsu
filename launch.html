<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣血脂 CDS - 啟動中...</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
  
  <style>
    :root {
      --primary: #0066cc;
      --bg-dark: #0a192f;
      --text-light: #e6f1ff;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .loader-container { 
      padding: 20px; 
      max-width: 460px; 
    }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message {
      color: #ff6b6b;
      margin-top: 20px;
      font-size: 14px;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: left;
      display: none;
    }
    .error-message a { color: #4da6ff; }
  </style>
</head>
<body>

  <div class="loader-container">
    <div class="loader" id="loader"></div>
    <h2>正在連線至 FHIR 醫療資訊系統...</h2>
    <p>請稍候，我們正在準備您的臨床決策輔助工具</p>
    <div id="errorMsg" class="error-message"></div>
  </div>

  <script>
    /**
     * 推薦版 launch.html - Public Client（適合 GitHub Pages）
     * 已移除 clientSecret，使用 PKCE + 正確處理 iss/launch 參數
     */

    const redirectUri = window.location.href.replace(/launch\.html.*$/, 'index.html');

    // 從 URL 取得 iss 和 launch 參數
    const urlParams = new URLSearchParams(window.location.search);
    const iss = urlParams.get('iss');
    const launchParam = urlParams.get('launch');

    FHIR.oauth2.authorize({
      clientId: "cc344727-6f90-496c-94fd-c7829aa9a51d",
      clientSecret : "79f04b56b33491716c0880af72cdef7d3f0629111421cedd18353651cd313d9e",
      scope: "launch launch/patient openid fhirUser patient/Patient.read patient/Observation.read patient/MedicationRequest.read patient/Condition.read",

      redirectUri: redirectUri,

      pkceMode: "S256",

      // 明確傳入 Launcher 帶來的參數
      iss: iss,
      launch: launchParam

    }).catch(err => {
      console.error("FHIR 授權失敗:", err);

      document.getElementById("loader").style.display = "none";
      const errorDiv = document.getElementById("errorMsg");
      errorDiv.style.display = "block";
      errorDiv.innerHTML = `
        <strong>⚠️ 授權啟動失敗</strong><br>
        錯誤：${err.message || err}<br><br>
        <small>
          請關閉此視窗，返回 
          <a href="https://launch.smarthealthit.org/" target="_blank">SMART Launcher</a> 
          重新點擊 Launch。
        </small>
      `;
    });
  </script>
</body>
</html>
