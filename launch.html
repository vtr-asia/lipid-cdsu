<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣血脂 CDS - 啟動中...</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- fhirclient 穩定版本 -->
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
  
  <style>
    :root {
      --primary: #0066cc;
      --bg-dark: #0a192f;
      --text-light: #e6f1ff;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .loader-container { 
      padding: 40px; 
      max-width: 420px;
    }
    .loader {
      border: 5px solid rgba(255, 255, 255, 0.15);
      border-left-color: var(--primary);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1.2s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }
    .error-message {
      color: #ff6b6b;
      margin-top: 20px;
      font-size: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="loader-container">
    <div class="loader"></div>
    <h2>正在連線至 FHIR 醫療資訊系統...</h2>
    <p>請稍候，我們正在準備您的臨床決策輔助工具（台灣血脂 CDS）</p>
    
    <div id="errorMsg" class="error-message"></div>
  </div>

  <script>
    /**
     * 修正版 launch.html - 適合 GitHub Pages + SMART Sandbox
     * - 使用完整 redirectUri
     * - 強制 PKCE S256
     * - 優化 scope
     * - 改善錯誤顯示
     */

    const redirectUri = "https://vtr-asia.github.io/lipid-cdsu/index.html";

    FHIR.oauth2.authorize({
      clientId: "cc344727-6f90-496c-94fd-c7829aa9a51d",

      // EHR Launch 推薦 scopes（已包含 launch/patient）
      scope: "launch launch/patient openid fhirUser patient/Patient.read patient/Observation.read patient/MedicationRequest.read patient/Condition.read",

      // 完整絕對路徑（重要！）
      redirectUri: redirectUri,

      // 強制使用安全的 PKCE S256
      pkceMode: "S256"

    }).catch(err => {
      console.error("❌ FHIR OAuth 授權啟動失敗:", err);

      // 在畫面上顯示友善錯誤提示
      const errorDiv = document.getElementById("errorMsg");
      errorDiv.style.display = "block";
      errorDiv.innerHTML = `
        授權啟動失敗<br>
        <small>錯誤: ${err.message || err}</small><br><br>
        請關閉此視窗，並從 
        <a href="https://launch.smarthealthit.org/" target="_blank" style="color:#4da6ff;">SMART Launcher</a> 
        重新啟動 App。
      `;
    });
  </script>
</body>
</html>
