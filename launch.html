<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣血脂 CDS - 系統啟動中</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
  
  <style>
    :root {
      --primary: #0066cc;
      --bg-dark: #0a192f;
      --text-light: #e6f1ff;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .loader-container { padding: 20px; }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="loader-container">
    <div class="loader"></div>
    <h2>正在連線至 FHIR 醫療資訊系統...</h2>
    <p>請稍候，我們正在為您準備臨床決策輔助工具 (CDS)</p>
  </div>

  <script>
    /**
     * SMART on FHIR 啟動邏輯
     * 說明：此頁面負責與 EHR (Sandbox) 進行 OAuth2 握手
     */
    FHIR.oauth2.authorize({
      // 1. Client ID: 請確保此 ID 與您在 SmartHealthIT Sandbox 設定的一致
      // 提醒：如果是公用 App (Public Client)，不需要也不應提供 clientSecret
      clientId: "cc344727-6f90-496c-94fd-c7829aa9a51d", 

      // 2. Scope: 定義 App 需要存取的資料權限
      // launch: 允許從 EHR 啟動
      // patient/*.read: 讀取當前病人的所有相關資源（Patient, Observation, Condition 等）
      scope: "launch openid fhirUser patient/*.read",

      // 3. Redirect URI: 授權成功後跳轉的頁面
      // 必須在 Sandbox 的 "Redirect URIs" 清單中註冊
      redirectUri: "index.html", 

      // 4. 安全設定：使用 PKCE (Proof Key for Code Exchange)
      // 這是目前單頁應用程式 (SPA) 最安全的授權方式
      pkceMode: "ifSupported"

    }).catch(err => {
      // 靜默錯誤處理：僅在開發者控制台記錄，不干擾使用者介面
      console.error("FHIR Authorization Error:", err);
    });
  </script>
</body>
</html>
