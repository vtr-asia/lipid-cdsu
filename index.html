<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>🩺 台灣血脂 CDS - 2025 臨床路徑</title>
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; line-height: 1.6; background-color: #f0f2f5; }
    .header { text-align: center; margin-bottom: 30px; }
    .patient-info { margin-bottom: 20px; padding: 20px; border-radius: 12px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #0066cc; }
    .decision { color: white; padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
    .status-good { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); }
    .status-warning { background: linear-gradient(135deg, #f39c12 0%, #f1c40f 100%); }
    .status-danger { background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); }
    .status-unknown { background: linear-gradient(135deg, #7f8c8d 0%, #95a5a6 100%); }
    .debug-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    pre { background: #2d3436; color: #dfe6e9; padding: 15px; border-radius: 8px; font-size: 11px; overflow: auto; max-height: 300px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🩺 台灣血脂 CDS 決策支援系統</h1>
    <p>依據 2025 台灣血脂管理專家共識建議</p>
  </div>

  <div id="patientDisplay" class="patient-info">
    <strong>當前病患：</strong> <span id="pName">讀取中...</span> | 
    <strong>性別：</strong> <span id="pGender">-</span> | 
    <strong>生日：</strong> <span id="pBirth">-</span>
  </div>

  <div id="decisionResult">
    <div style="text-align: center; padding: 50px;">正在交換金鑰並分析臨床數據...</div>
  </div>

  <div class="debug-panel">
    <div>
      <h3>📄 Patient Resource (JSON)</h3>
      <pre id="patientRaw">等待資料...</pre>
    </div>
    <div>
      <h3>🧪 Observation Resource (LDL)</h3>
      <pre id="obsRaw">等待資料...</pre>
    </div>
  </div>

  <script>
    const LOINC_LDL = "13457-7";

    // 手動解析姓名，避免 getName 報錯
    function parsePatientName(patient) {
      if (!patient || !patient.name || patient.name.length === 0) return "未知姓名";
      const n = patient.name[0];
      return n.text || `${n.family || ""} ${n.given ? n.given.join(" ") : ""}`.trim();
    }

    // 2025 血脂共識決策邏輯
    function evaluateStatinRecommendation(ldl) {
      const target = 100; // 預設目標值
      if (ldl === null) {
        return `<div class="decision status-unknown"><h3>❓ 缺乏 LDL 資料</h3><p>請安排血脂檢驗以利評估。</p></div>`;
      }
      const isAchieved = ldl < target;
      const statusClass = isAchieved ? "status-good" : (ldl >= target * 1.2 ? "status-danger" : "status-warning");
      const title = isAchieved ? "✅ 已達標" : "⚠️ 未達標";
      
      return `
        <div class="decision ${statusClass}">
          <h2>${title}</h2>
          <p>最新 LDL-C: ${ldl} mg/dL (目標: < ${target})</p>
          <p>建議：${isAchieved ? "維持目前治療。" : "考慮調整藥物劑量或合併治療。"}</p>
        </div>`;
    }

    // 初始化 SMART 
    FHIR.oauth2.ready().then(async (client) => {
      try {
        // 讀取病人基本資料
        const patient = await client.patient.read();
        document.getElementById("patientRaw").textContent = JSON.stringify(patient, null, 2);
        document.getElementById("pName").textContent = parsePatientName(patient);
        document.getElementById("pGender").textContent = patient.gender || "不詳";
        document.getElementById("pBirth").textContent = patient.birthDate || "不詳";

        // 讀取最新 LDL 檢驗值
        const obsBundle = await client.request(`Observation?code=${LOINC_LDL}&_sort=-date&_count=1`);
        document.getElementById("obsRaw").textContent = JSON.stringify(obsBundle, null, 2);

        let ldlValue = null;
        if (obsBundle.entry && obsBundle.entry.length > 0) {
          ldlValue = obsBundle.entry[0].resource.valueQuantity?.value;
        }

        document.getElementById("decisionResult").innerHTML = evaluateStatinRecommendation(ldlValue);
      } catch (err) {
        document.getElementById("decisionResult").innerHTML = `<div class="decision status-danger">❌ 資料讀取失敗: ${err.message}</div>`;
      }
    }).catch(err => {
      document.getElementById("decisionResult").innerHTML = `<div class="decision status-danger">❌ 授權失敗，請重新啟動</div>`;
    });
  </script>
</body>
</html>
