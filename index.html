<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖尿病共照網品質儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .transition-all { transition: all 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans transition-all" id="body-bg">

    <nav class="bg-slate-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-hospital-user text-2xl text-blue-400"></i>
                <span class="text-xl font-bold tracking-tight">糖尿病共照網儀表板</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <div id="loading" class="text-center py-12">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500"></i>
            <p class="mt-4 text-slate-600">正在從沙盒讀取病人資料...</p>
        </div>

        <div id="content" class="hidden">
            <!-- 病人卡片 -->
            <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-slate-200 flex flex-wrap justify-between items-center" id="patient-card">
                <div class="flex items-center space-x-6">
                    <div id="avatar-box" class="w-20 h-20 rounded-full flex items-center justify-center text-white text-3xl shadow-inner bg-blue-500">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold text-slate-800" id="ui-name">讀取中...</h1>
                        <p class="text-slate-500">FHIR ID: <span id="ui-id" class="font-mono"></span> | <span id="ui-gender"></span> | <span id="ui-age"></span> 歲</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 左側主要區域 -->
                <div class="lg:col-span-2 space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-red-500" id="card-hba1c">
                            <span class="text-slate-400 font-bold uppercase text-xs tracking-wider">HbA1c (糖化血色素)</span>
                            <div class="mt-4 flex items-baseline">
                                <span class="text-5xl font-black text-slate-800" id="ui-hba1c">--</span>
                                <span class="text-xl text-slate-400 ml-1">%</span>
                            </div>
                            <p class="mt-2 text-sm font-bold text-red-600" id="ui-hba1c-msg"></p>
                        </div>

                        <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-orange-500" id="card-eye">
                            <span class="text-slate-400 font-bold uppercase text-xs tracking-wider">眼底檢查狀態</span>
                            <div class="mt-4">
                                <span class="text-2xl font-bold text-slate-800" id="ui-eye-status">查詢中...</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm">
                        <h3 class="text-slate-800 font-bold mb-4">HbA1c 歷史趨勢</h3>
                        <canvas id="trendChart" height="100"></canvas>
                    </div>
                </div>

                <!-- 右側 -->
                <div class="space-y-6">
                    <!-- CDS -->
                    <div class="p-6 rounded-xl shadow-lg bg-slate-800 text-white">
                        <h3 class="text-blue-400 font-bold text-xs mb-4 tracking-widest uppercase">Clinical Decision Support</h3>
                        <div id="ui-suggestions" class="space-y-4 text-sm"></div>
                    </div>

                    <!-- 糖尿病衛教區（新增） -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-emerald-200">
                        <h3 class="flex items-center gap-2 text-emerald-700 font-bold mb-4">
                            <i class="fa-solid fa-book-open"></i>
                            糖尿病衛教專區
                        </h3>
                        <div id="education-content" class="space-y-5 text-sm"></div>
                        <button onclick="showEducationModal()" class="mt-6 w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-700 transition-all">
                            查看完整衛教資源
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 衛教 Modal -->
    <div id="education-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-6">
            <h2 class="text-xl font-bold mb-4">糖尿病衛教資源庫</h2>
            <div class="text-slate-600 space-y-3 text-sm">
                <p>• 飲食控制：低 GI 食物選擇</p>
                <p>• 規律運動：每週 150 分鐘</p>
                <p>• 血糖自我監測技巧</p>
                <p>• 足部護理與併發症預防</p>
            </div>
            <button onclick="hideEducationModal()" class="mt-6 w-full py-3 bg-slate-200 rounded-lg">關閉</button>
        </div>
    </div>

    <script>
        let currentChart = null;

        async function initApp() {
            try {
                const client = await FHIR.oauth2.ready();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');

                // 取得病人基本資料
                const patient = await client.patient.read();
                document.getElementById('ui-name').textContent = patient.name?.[0]?.text || '未知姓名';
                document.getElementById('ui-id').textContent = patient.id;
                document.getElementById('ui-gender').textContent = patient.gender === 'male' ? '男' : '女';

                // 模擬年齡（實際可從 birthDate 計算）
                document.getElementById('ui-age').textContent = '56';

                // 取得 HbA1c Observation（範例）
                const obs = await client.request('Observation?category=laboratory&code=http://loinc.org|4548-4', { flat: true });
                let hba1c = obs.length > 0 ? obs[0].valueQuantity?.value || 7.2 : 7.2;

                document.getElementById('ui-hba1c').textContent = hba1c.toFixed(1);
                document.getElementById('ui-hba1c-msg').textContent = hba1c > 7.0 ? '● 高於目標值' : '● 控制良好';

                // 更新衛教區（根據 HbA1c 個人化）
                updateEducationSection(hba1c);

                // 模擬趨勢圖
                updateChart([6.8, 7.1, 7.5, hba1c], hba1c > 7.5 ? '#ef4444' : '#22c55e');

            } catch (err) {
                console.error(err);
                alert('讀取病人資料失敗，請確認已在 SMART Launcher 中選擇病人。');
            }
        }

        function updateEducationSection(hba1c) {
            const container = document.getElementById('education-content');
            let items = [];

            if (hba1c > 8.0) {
                items = [
                    { icon: "fa-solid fa-chart-line", title: "高血糖控制", desc: "建議立即調整飲食與用藥，加強血糖監測。" },
                    { icon: "fa-solid fa-apple-whole", title: "飲食調整", desc: "減少精製碳水化合物，多吃蔬菜與優質蛋白。" }
                ];
            } else {
                items = [
                    { icon: "fa-solid fa-shield-halved", title: "維持良好控制", desc: "恭喜！目前血糖控制穩定，請繼續保持。" },
                    { icon: "fa-solid fa-dumbbell", title: "運動建議", desc: "每週維持 150 分鐘中強度運動。" }
                ];
            }

            container.innerHTML = items.map(item => `
                <div class="flex gap-3">
                    <i class="${item.icon} text-emerald-600 mt-1"></i>
                    <div>
                        <p class="font-semibold">${item.title}</p>
                        <p class="text-slate-600 text-xs">${item.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function updateChart(data, color) {
            if (currentChart) currentChart.destroy();
            const ctx = document.getElementById('trendChart').getContext('2d');
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Q1', 'Q2', 'Q3', 'Q4'],
                    datasets: [{ label: 'HbA1c %', data: data, borderColor: color, tension: 0.4, fill: true }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        function showEducationModal() {
            document.getElementById('education-modal').classList.remove('hidden');
            document.getElementById('education-modal').classList.add('flex');
        }

        function hideEducationModal() {
            document.getElementById('education-modal').classList.add('hidden');
            document.getElementById('education-modal').classList.remove('flex');
        }

        // 啟動應用程式
        window.onload = initApp;
    </script>
</body>
</html>
