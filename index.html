<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🩺 台灣血脂 CDS - 2025 臨床路徑</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
  <style>
    :root {
      --primary: #0a4f8c;
      --primary-light: #1a6fbc;
      --accent: #00b4d8;
      --good: #1a7f4b;
      --good-light: #22a861;
      --warn: #c47a00;
      --warn-light: #f0a500;
      --danger: #a81f1f;
      --danger-light: #d63031;
      --unknown: #4a5568;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1a2332;
      --text-muted: #5a6a7e;
      --border: #dde3ec;
      --shadow: 0 2px 12px rgba(10,79,140,0.10);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .topbar-title { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .topbar-sub   { font-size: 13px; opacity: 0.8; margin-top: 2px; }
    .auth-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 500;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #fbbf24; display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* ── Main layout ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* ── Context bar ── */
    .context-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .context-chip {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 5px;
    }
    .context-chip span { color: var(--primary); font-weight: 600; }

    /* ── Patient card ── */
    .patient-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .patient-avatar {
      width: 58px; height: 58px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .patient-info { flex: 1; min-width: 200px; }
    .patient-name { font-size: 20px; font-weight: 700; color: var(--primary); }
    .patient-meta { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .patient-id-chip {
      background: #e8f0fe; color: var(--primary);
      border-radius: 8px; padding: 3px 10px;
      font-size: 12px; font-weight: 500; margin-top: 6px; display: inline-block;
    }
    .select-wrap { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .select-wrap label { font-weight: 600; font-size: 14px; color: var(--text-muted); white-space: nowrap; }
    select {
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: white;
      color: var(--text);
      cursor: pointer;
      min-width: 260px;
      transition: border-color 0.2s;
    }
    select:focus { outline: none; border-color: var(--primary-light); }

    /* ── Metrics row ── */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .metric-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
    }
    .metric-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-value { font-size: 30px; font-weight: 800; color: var(--primary); margin-top: 6px; }
    .metric-unit  { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    /* ── Decision card ── */
    .decision {
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
      color: white;
      position: relative;
      overflow: hidden;
      transition: all 0.35s ease;
    }
    .decision::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .status-good    { background: linear-gradient(135deg, var(--good) 0%, var(--good-light) 100%); }
    .status-warning { background: linear-gradient(135deg, var(--warn) 0%, var(--warn-light) 100%); }
    .status-danger  { background: linear-gradient(135deg, var(--danger) 0%, var(--danger-light) 100%); }
    .status-unknown { background: linear-gradient(135deg, #3d4f63 0%, var(--unknown) 100%); }
    .decision-title   { font-size: 26px; font-weight: 800; letter-spacing: 0.3px; }
    .decision-value   { font-size: 17px; opacity: 0.92; margin-top: 6px; }
    .decision-divider { border: none; border-top: 1px solid rgba(255,255,255,0.28); margin: 16px 0; }
    .decision-body    { font-size: 15px; line-height: 1.8; }
    .decision-body strong { font-weight: 700; }

    /* ── Loading / Error ── */
    .loading-state {
      background: var(--card);
      border-radius: var(--radius);
      padding: 50px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .spinner {
      border: 4px solid var(--border);
      border-left-color: var(--primary-light);
      border-radius: 50%;
      width: 42px; height: 42px;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 16px; color: var(--text-muted); }

    .error-state {
      background: #fff5f5;
      border: 1.5px solid #fca5a5;
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .error-state h3 { color: var(--danger-light); font-size: 18px; margin-bottom: 10px; }
    .error-state p  { font-size: 14px; color: #7f1d1d; line-height: 1.7; }
    .error-state code { background: #fee2e2; padding: 2px 6px; border-radius: 4px; font-size: 13px; }

    /* ── Debug panel ── */
    .debug-section { margin-top: 8px; }
    .debug-toggle {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 16px;
      font-size: 13px; color: var(--text-muted);
      cursor: pointer; margin-bottom: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .debug-toggle:hover { background: var(--border); color: var(--text); }
    .debug-panel { display: none; grid-template-columns: 1fr 1fr; gap: 20px; }
    .debug-panel.open { display: grid; }
    .debug-block h4 {
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    pre {
      background: #1a2332; color: #a8c4e0;
      padding: 16px; border-radius: 10px;
      font-size: 11.5px; overflow: auto;
      max-height: 280px; line-height: 1.6;
    }

    @media (max-width: 680px) {
      .topbar { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 18px; }
      .main { padding: 18px 14px; }
      .patient-card { padding: 16px; }
      .decision { padding: 20px; }
      .decision-title { font-size: 21px; }
      .debug-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div>
      <div class="topbar-title">🩺 台灣血脂 CDS 決策支援系統</div>
      <div class="topbar-sub">依據 2025 台灣血脂管理專家共識建議</div>
    </div>
    <div class="auth-badge" id="authBadge">
      <span class="dot"></span> OAuth 授權中...
    </div>
  </div>

  <div class="main">

    <div class="context-bar" id="contextBar" style="display:none;">
      <div class="context-chip">🏥 FHIR Server：<span id="ctxServer">—</span></div>
      <div class="context-chip">👤 病人 ID：<span id="ctxPatient">—</span></div>
      <div class="context-chip">🩺 醫師：<span id="ctxPractitioner">—</span></div>
      <div class="context-chip">📋 Encounter：<span id="ctxEncounter">—</span></div>
    </div>

    <div class="patient-card">
      <div class="patient-avatar" id="patientAvatar">👤</div>
      <div class="patient-info">
        <div class="patient-name" id="patientName">— 未選擇病人 —</div>
        <div class="patient-meta" id="patientMeta">請選擇個案或等待 EHR context 載入</div>
        <div class="patient-id-chip" id="patientIdChip">ID：—</div>
      </div>
      <div class="select-wrap">
        <label for="patientSelect">個案選擇：</label>
        <select id="patientSelect">
          <option value="case-001">Case 1：陳建國（一般風險 - 目標 130）</option>
          <option value="case-002">Case 2：林淑芬（高風險/糖尿病 - 目標 100）</option>
          <option value="case-003">Case 3：李大衛（非常高風險/MI - 目標 70）</option>
          <option value="case-004">Case 4：張阿中（極高風險/洗腎 - 目標 70）</option>
          <option value="case-005">Case 5：查無此人（數據缺失測試）</option>
        </select>
      </div>
    </div>

    <div class="metrics-row" id="metricsRow" style="display:none;">
      <div class="metric-card">
        <div class="metric-label">LDL-C 數值</div>
        <div class="metric-value" id="mLdl">—</div>
        <div class="metric-unit">mg/dL</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">治療目標</div>
        <div class="metric-value" id="mTarget">—</div>
        <div class="metric-unit">mg/dL（上限）</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">與目標差距</div>
        <div class="metric-value" id="mGap">—</div>
        <div class="metric-unit">mg/dL</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">風險分層</div>
        <div class="metric-value" id="mRisk" style="font-size:18px;padding-top:6px;">—</div>
        <div class="metric-unit">&nbsp;</div>
      </div>
    </div>

    <div id="decisionResult">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">正在完成 OAuth 授權並載入臨床資料...</div>
      </div>
    </div>

    <div class="debug-section" id="debugSection" style="display:none;">
      <button class="debug-toggle" id="debugToggle" onclick="toggleDebug()">▶ 顯示原始 FHIR 資源</button>
      <div class="debug-panel" id="debugPanel">
        <div class="debug-block">
          <h4>📄 Patient 資源（JSON）</h4>
          <pre id="debugPatient">—</pre>
        </div>
        <div class="debug-block">
          <h4>🧪 Observation 資源（JSON）</h4>
          <pre id="debugObs">—</pre>
        </div>
      </div>
    </div>

  </div>

  <script>
  // ═══════════════════════════════════════════════════════════════
  // 1. 風險設定常數
  // ═══════════════════════════════════════════════════════════════
  const PATIENT_RISK = {
    "case-001": { level:"low",      icon:"🟢", label:"一般風險",   name:"陳建國", target:130, desc:"無重大心血管疾病、無糖尿病、無慢性腎病" },
    "case-002": { level:"high",     icon:"🟡", label:"高風險",     name:"林淑芬", target:100, desc:"糖尿病病史（DM）" },
    "case-003": { level:"veryhigh", icon:"🔴", label:"非常高風險", name:"李大衛", target:70,  desc:"曾患急性心肌梗塞（History of MI）" },
    "case-004": { level:"veryhigh", icon:"🔴", label:"極高風險",   name:"張阿中", target:70,  desc:"慢性腎病第五期（CKD Stage 5 / 洗腎）" },
    "case-005": { level:"unknown",  icon:"⚪", label:"未知",       name:"查無此人", target:null, desc:"新進病人，尚無血脂紀錄" }
  };
  const LOINC_LDL = "13457-7";

  // ═══════════════════════════════════════════════════════════════
  // 2. CDS 決策邏輯（2025 專家共識版）
  // ═══════════════════════════════════════════════════════════════
  function evaluateStatinRecommendation(ldl, patientId) {
    const risk = PATIENT_RISK[patientId];
    if (!risk) return { html:"<div class='decision status-unknown'><div class='decision-title'>❓ 查無此個案風險設定</div></div>", ldl:null, target:null };

    if (ldl === null || ldl === undefined) {
      return {
        html:`<div class="decision status-unknown">
          <div class="decision-title">❓ 臨床資訊不足</div>
          <div class="decision-value">找不到 LDL-C 檢驗紀錄（LOINC: ${LOINC_LDL}）</div>
          <hr class="decision-divider">
          <div class="decision-body">
            <strong>個案背景：</strong> ${risk.desc}<br><br>
            <strong>建議：</strong> 目前無法判定是否達標。建議醫師立即安排血脂抽血檢驗，以進行風險分層管理。
          </div>
        </div>`,
        ldl:null, target:risk.target
      };
    }

    const target = risk.target;
    const gap = ldl - target;
    const isAchieved = ldl < target;
    const isSeverelyHigh = ldl >= target * 1.2;

    let statusClass = "status-good";
    let title = "✅ 良好控制";
    let drugAdvice = "目前治療效果理想。依據 2025 臺灣共識，建議維持良好飲食習慣與現有藥物，並定期追蹤血脂數值。";

    if (!isAchieved) {
      statusClass = isSeverelyHigh ? "status-danger" : "status-warning";
      title = isSeverelyHigh ? "🚨 立即加強治療" : "⚠️ 尚未達標";
      drugAdvice = isSeverelyHigh
        ? `<strong>專家建議（2025 共識）：</strong> LDL-C 顯著超出目標值 ${gap.toFixed(0)} mg/dL。建議在最大耐受劑量 Statin 之外，考慮合併使用 <strong>Ezetimibe</strong> 或 <strong>PCSK9 抑制劑</strong>，以達到更積極的降脂目標。`
        : `<strong>專家建議（2025 共識）：</strong> LDL-C 超出目標值 ${gap.toFixed(0)} mg/dL。建議評估藥物順從性，並考慮調升 Statin 劑量或更換為強效型 Statin（如 Rosuvastatin / Atorvastatin）。`;
    }

    return {
      html:`<div class="decision ${statusClass}">
        <div class="decision-title">${title}</div>
        <div class="decision-value">
          目前 LDL-C：${ldl} mg/dL &nbsp;｜&nbsp; 治療目標：&lt; ${target} mg/dL
          &nbsp;｜&nbsp; 差距：${gap > 0 ? '+' : ''}${gap.toFixed(0)} mg/dL
        </div>
        <hr class="decision-divider">
        <div class="decision-body">
          <strong>風險分層：</strong> ${risk.icon} ${risk.label}（${risk.desc}）<br><br>
          ${drugAdvice}
        </div>
      </div>`,
      ldl, target, gap
    };
  }

  // ═══════════════════════════════════════════════════════════════
  // 3. UI 輔助函數
  // ═══════════════════════════════════════════════════════════════
  function updatePatientCard(patientId) {
    const risk = PATIENT_RISK[patientId] || {};
    const avatarMap = { low:"🟢", high:"🟡", veryhigh:"🔴", unknown:"⚪" };
    document.getElementById("patientAvatar").textContent = avatarMap[risk.level] || "👤";
    document.getElementById("patientName").textContent  = risk.name  || patientId;
    document.getElementById("patientMeta").textContent  = risk.desc  || "—";
    document.getElementById("patientIdChip").textContent = `風險：${risk.label || "—"}  ｜  ID：${patientId}`;
    document.getElementById("mRisk").textContent = risk.icon ? `${risk.icon} ${risk.label}` : "—";
  }

  function updateMetrics(ldl, target) {
    const row = document.getElementById("metricsRow");
    if (ldl === null || ldl === undefined || target === null) { row.style.display = "none"; return; }
    row.style.display = "grid";
    const gap = ldl - target;
    document.getElementById("mLdl").textContent    = ldl;
    document.getElementById("mTarget").textContent = `< ${target}`;
    document.getElementById("mGap").textContent    = (gap > 0 ? "+" : "") + gap.toFixed(0);
    document.getElementById("mGap").style.color    = gap > 0 ? "var(--danger-light)" : "var(--good)";
  }

  function toggleDebug() {
    const panel = document.getElementById("debugPanel");
    const btn   = document.getElementById("debugToggle");
    panel.classList.toggle("open");
    btn.textContent = panel.classList.contains("open") ? "▼ 隱藏原始 FHIR 資源" : "▶ 顯示原始 FHIR 資源";
  }

  // ═══════════════════════════════════════════════════════════════
  // 4. 使用 SMART client 載入 FHIR 資料
  // ═══════════════════════════════════════════════════════════════
  async function loadPatientData(client, patientId) {
    updatePatientCard(patientId);

    document.getElementById("decisionResult").innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">讀取個案 ${patientId} 的臨床資料...</div>
      </div>`;
    document.getElementById("metricsRow").style.display = "none";

    try {
      // ── Patient ───────────────────────────────────────────
      let pJson = null;
      try {
        pJson = await client.request(`Patient/${patientId}`);
        document.getElementById("debugPatient").textContent = JSON.stringify(pJson, null, 2);
        if (pJson && pJson.name && pJson.name[0]) {
          const n = pJson.name[0];
          const fullName = n.text || [n.family, ...(n.given || [])].filter(Boolean).join(" ");
          if (fullName.trim()) document.getElementById("patientName").textContent = fullName;
        }
      } catch(e) {
        document.getElementById("debugPatient").textContent = `Patient 查無結果 (404 / 錯誤):\n${e}`;
      }

      // ── LDL Observation ───────────────────────────────────
      let ldl = null;
      try {
        const oJson = await client.request(
          `Observation?patient=${patientId}&code=${LOINC_LDL}&_sort=-date&_count=1`
        );
        document.getElementById("debugObs").textContent = JSON.stringify(oJson, null, 2);
        if (oJson && oJson.entry && oJson.entry.length > 0) {
          const obs = oJson.entry[0].resource;
          ldl = obs.valueQuantity ? obs.valueQuantity.value : null;
        }
      } catch(e) {
        document.getElementById("debugObs").textContent = `Observation 查無結果:\n${e}`;
      }

      // ── CDS 決策 ──────────────────────────────────────────
      const result = evaluateStatinRecommendation(ldl, patientId);
      document.getElementById("decisionResult").innerHTML = result.html;
      updateMetrics(result.ldl, result.target);
      document.getElementById("debugSection").style.display = "block";

    } catch(e) {
      console.error("FHIR 載入錯誤:", e);
      document.getElementById("decisionResult").innerHTML = `
        <div class="error-state">
          <h3>❌ FHIR 資料載入失敗</h3>
          <p>${e.message || String(e)}</p>
          <p style="margin-top:10px;font-size:13px;">請確認 SMART Launcher 設定正確，或嘗試重新授權。</p>
        </div>`;
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // 5. ⭐ 關鍵：FHIR.oauth2.ready() — 完成 Authorization Code 換 Token
  //    原始 index.html 完全缺少此段，導致永遠拿不到 access_token
  // ═══════════════════════════════════════════════════════════════
  document.addEventListener("DOMContentLoaded", () => {
    FHIR.oauth2.ready()
      .then(client => {

        // ── 更新授權狀態 badge ──
        document.getElementById("authBadge").innerHTML =
          `<span class="dot" style="background:#4ade80;"></span> OAuth 授權成功`;

        // ── 顯示 context 資訊列 ──
        document.getElementById("contextBar").style.display = "flex";
        const url = client.state.serverUrl || "—";
        document.getElementById("ctxServer").textContent = url.length > 45 ? url.slice(0,45)+"…" : url;
        document.getElementById("ctxPatient").textContent = client.patient?.id || "—";
        document.getElementById("ctxPractitioner").textContent =
          client.state.tokenResponse?.smart_user || client.state.tokenResponse?.practitioner || "—";
        document.getElementById("ctxEncounter").textContent =
          client.encounter?.id || client.state.tokenResponse?.encounter || "—";

        console.log("✅ SMART ready. State:", client.state);

        // ── 初始化 selector ──
        const select = document.getElementById("patientSelect");

        // 若 EHR 帶入 patient context，嘗試自動對應
        if (client.patient?.id) {
          const opts = Array.from(select.options);
          const match = opts.find(o => o.value === client.patient.id);
          if (match) select.value = client.patient.id;
          console.log("EHR Patient context:", client.patient.id);
        }

        loadPatientData(client, select.value);

        select.addEventListener("change", e => loadPatientData(client, e.target.value));
      })
      .catch(err => {
        console.error("OAuth ready() 失敗:", err);
        document.getElementById("authBadge").innerHTML =
          `<span class="dot" style="background:#f87171; animation:none;"></span> 授權失敗`;

        document.getElementById("decisionResult").innerHTML = `
          <div class="error-state">
            <h3>❌ SMART OAuth 授權失敗</h3>
            <p><strong>錯誤訊息：</strong> <code>${err.message || String(err)}</code></p>
            <p style="margin-top:12px;">
              <strong>常見原因與解法：</strong><br>
              1. 未從 SMART Launcher 啟動 → 請先開啟 <code>launch.html</code><br>
              2. <code>redirectUri</code> 與 Launcher 設定不符 → 確認兩者完全一致<br>
              3. Authorization Code 已過期（5 分鐘）→ 請重新點選 Launcher 的 Launch App
            </p>
          </div>`;
      });
  });
  </script>
</body>
</html>
