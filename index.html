<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖尿病共照網 - 品質管理儀表板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2/build/fhir-client.js"></script>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: "Helvetica Neue", Helvetica, "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6; 
        }

        .wrapper { display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            background-color: var(--card-bg); 
            padding: 15px 30px; 
            box-shadow: var(--shadow); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10; 
        }
        .brand { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--primary-color); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .user-info { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .status-badge { 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            background-color: #eee; 
        }
        .status-verified { 
            background-color: rgba(46, 204, 113, 0.1); 
            color: var(--success-color); 
            border: 1px solid var(--success-color); 
        }

        main { flex: 1; padding: 30px; overflow-y: auto; }
        .container { max-width: 1200px; margin: 0 auto; }

        .page-header { 
            margin-bottom: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .page-title { 
            font-size: 1.8rem; 
            font-weight: 700; 
            color: var(--text-color); 
        }

        .patient-card { 
            background-color: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: var(--shadow); 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 30px; 
            border-left: 5px solid var(--primary-color); 
        }
        .patient-avatar { 
            width: 60px; 
            height: 60px; 
            background-color: #e1f5fe; 
            color: var(--primary-color); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem; 
        }
        .patient-details h2 { 
            font-size: 1.4rem; 
            margin-bottom: 5px; 
        }
        .patient-details p { 
            color: #7f8c8d; 
            font-size: 0.9rem; 
        }

        .metrics-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
        }
        
        .metric-card { 
            background-color: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: var(--shadow); 
            transition: transform 0.2s; 
            position: relative; 
            overflow: hidden; 
        }
        .metric-card:hover { transform: translateY(-3px); }
        .metric-title { 
            font-size: 1rem; 
            color: #7f8c8d; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .metric-value { 
            font-size: 2.5rem; 
            font-weight: bold; 
            color: var(--text-color); 
        }
        .metric-unit { 
            font-size: 1rem; 
            color: #7f8c8d; 
            font-weight: normal; 
            margin-left: 5px; 
        }
        .metric-status { 
            position: absolute; 
            top: 0; 
            right: 0; 
            width: 6px; 
            height: 100%; 
        }

        .status-good { color: var(--success-color) !important; }
        .status-good-bg { background-color: var(--success-color); }
        .status-warn { color: var(--warning-color) !important; }
        .status-warn-bg { background-color: var(--warning-color); }
        .status-bad { color: var(--danger-color) !important; }
        .status-bad-bg { background-color: var(--danger-color); }

        .progress-container { 
            margin-top: 15px; 
            background-color: #ecf0f1; 
            border-radius: 10px; 
            height: 10px; 
            overflow: hidden; 
        }
        .progress-bar { 
            height: 100%; 
            background-color: var(--primary-color); 
            border-radius: 10px; 
            width: 0%; 
            transition: width 0.5s ease-in-out; 
        }

        #loading-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(255,255,255,0.95); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }
        .spinner { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--primary-color); 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin-bottom: 15px; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        #medication-list {
            max-height: 320px; 
            overflow-y: auto; 
            padding: 10px 0;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p>正在從伺服器讀取病人資料與用藥紀錄...</p>
</div>

<div class="wrapper">
    <header>
        <div class="brand">
            <i class="fas fa-heartbeat"></i>
            <span>糖尿病共照網</span>
        </div>
        <div class="user-info">
            <span id="auth-status" class="status-badge">驗證中...</span>
            <i class="fas fa-user-circle fa-lg"></i>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">品質管理儀表板</h1>
                <p style="color: #7f8c8d;">數據時間：<span id="data-date"></span></p>
            </div>

            <!-- 病人基本資料 -->
            <div class="patient-card">
                <div class="patient-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="patient-details">
                    <h2 id="patient-name">讀取中...</h2>
                    <p id="patient-id-display">FHIR ID: --</p>
                </div>
            </div>

            <!-- 真實用藥紀錄 -->
            <div class="metric-card" style="margin-bottom: 30px;">
                <div class="metric-title">
                    <i class="fas fa-prescription-bottle-alt"></i> 近期用藥紀錄（來自 FHIR 伺服器）
                </div>
                <div id="medication-list">
                    <p style="color:#7f8c8d; padding: 15px;">正在從伺服器抓取用藥資料...</p>
                </div>
            </div>

            <!-- 品質指標卡片 -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-status status-good-bg"></div>
                    <div class="metric-title">
                        <i class="fas fa-vial"></i> 糖化血色素 (HbA1c) 檢驗率
                    </div>
                    <div>
                        <span id="hba1c-val" class="metric-value status-good">--</span>
                        <span class="metric-unit">%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar status-good-bg" style="width: 92%"></div>
                    </div>
                </div>

                <div class="metric-card">
                    <div class="metric-status status-warn-bg"></div>
                    <div class="metric-title">
                        <i class="fas fa-eye"></i> 眼底檢查或眼底攝影率
                    </div>
                    <div>
                        <span id="eye-val" class="metric-value status-warn">--</span>
                        <span class="metric-unit">%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar status-warn-bg" style="width: 85%"></div>
                    </div>
                </div>

                <div class="metric-card">
                    <div class="metric-status status-bad-bg"></div>
                    <div class="metric-title">
                        <i class="fas fa-prescription-bottle"></i> 尿液微量白蛋白檢查率 (ACR)
                    </div>
                    <div>
                        <span id="acr-val" class="metric-value status-bad">--</span>
                        <span class="metric-unit">%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar status-bad-bg" style="width: 68%"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // 設定日期
    document.getElementById('data-date').innerText = new Date().toLocaleDateString('zh-TW', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    });

    // FHIR OAuth 處理
    FHIR.oauth2.ready()
        .then(client => {
            console.log("✅ SMART Client Ready", client);

            // 隱藏載入畫面
            document.getElementById('loading-overlay').style.display = 'none';
            
            // 更新驗證狀態
            const authStatus = document.getElementById('auth-status');
            authStatus.innerText = '驗證成功';
            authStatus.classList.add('status-verified');

            // 1. 讀取病人基本資料（姓名 + FHIR ID）
            return client.patient.read().then(patient => {
                let displayName = "未知病患";
                if (patient.name && patient.name.length > 0) {
                    const n = patient.name[0];
                    if (n.text) {
                        displayName = n.text;                    // 中文姓名常用 text
                    } else {
                        displayName = `${n.family || ''} ${Array.isArray(n.given) ? n.given.join(' ') : ''}`.trim();
                    }
                }
                document.getElementById('patient-name').innerText = displayName;
                document.getElementById('patient-id-display').innerText = `FHIR ID: ${patient.id || '--'}`;
                return client;
            });
        })
        .then(client => {
            // 2. 讀取用藥紀錄（真正從伺服器抓取）
            const medListEl = document.getElementById('medication-list');
            return client.request(`MedicationRequest?patient=${client.patient.id}&_sort=-authoredOn&_count=15`)
                .then(bundle => {
                    medListEl.innerHTML = '';

                    if (!bundle.entry || bundle.entry.length === 0) {
                        medListEl.innerHTML = '<p style="color:#7f8c8d; padding:15px;">此病人目前無用藥紀錄</p>';
                        return;
                    }

                    let html = '<ul style="list-style:none; padding:0; margin:0;">';
                    bundle.entry.forEach(item => {
                        const m = item.resource;
                        if (!m) return;

                        const medName = m.medicationCodeableConcept?.text ||
                                       m.medicationCodeableConcept?.coding?.[0]?.display ||
                                       m.medicationReference?.display || 
                                       '未知藥品';

                        const dateStr = m.authoredOn 
                            ? new Date(m.authoredOn).toLocaleDateString('zh-TW') 
                            : '無日期';

                        const status = m.status 
                            ? ` <span style="color:var(--success-color); font-size:0.9em;">(${m.status})</span>` 
                            : '';

                        html += `
                            <li style="padding:12px 0; border-bottom:1px solid #eee;">
                                <strong>${medName}</strong>${status}<br>
                                <small style="color:#7f8c8d;">開立日期：${dateStr}</small>
                            </li>`;
                    });
                    html += '</ul>';
                    medListEl.innerHTML = html;
                })
                .catch(err => {
                    medListEl.innerHTML = `<p style="color:#e74c3c; padding:15px;">無法讀取用藥紀錄：${err.message || '伺服器錯誤'}</p>`;
                });
        })
        .catch(error => {
            console.error("❌ FHIR Error:", error);
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            overlay.innerHTML = `
                <i class="fas fa-exclamation-triangle fa-3x" style="color:#e74c3c; margin-bottom:20px;"></i>
                <h3 style="color:#e74c3c;">讀取失敗</h3>
                <p>${error.message || error}</p>
                <p style="font-size:0.9rem; margin-top:15px;">請確認 Client ID 已獲得授權，並檢查 redirect_uri 設定。</p>
            `;
        });

    // 數字動畫效果
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        const range = end - start;
        let current = start;
        const increment = end > start ? 1 : -1;
        const stepTime = Math.abs(Math.floor(duration / range)) || 20;

        const timer = setInterval(() => {
